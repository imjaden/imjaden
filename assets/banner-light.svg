<svg width="1000" height="200" viewBox="0 0 1000 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="50%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="glowLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#1e3a5f" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="200" fill="url(#bgLight)" rx="12"/>

  <!-- Glow line -->
  <rect y="80" width="1000" height="40" fill="url(#glowLight)"/>

  <!-- Decorative line top -->
  <line x1="40" y1="30" x2="300" y2="30" stroke="#1e3a5f" stroke-width="2" stroke-opacity="0.15"/>
  <circle cx="310" cy="30" r="3" fill="#1e3a5f" fill-opacity="0.3"/>

  <!-- Geometric accent - right side -->
  <rect x="880" y="30" width="80" height="80" rx="4" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.1"/>
  <rect x="890" y="40" width="60" height="60" rx="3" fill="none" stroke="#0891b2" stroke-width="1" stroke-opacity="0.08"/>
  <circle cx="920" cy="70" r="4" fill="#1e3a5f" fill-opacity="0.15"/>

  <!-- Small dots pattern -->
  <circle cx="800" cy="45" r="2" fill="#0891b2" fill-opacity="0.25"/>
  <circle cx="820" cy="65" r="1.5" fill="#1e3a5f" fill-opacity="0.3"/>
  <circle cx="810" cy="85" r="2" fill="#0891b2" fill-opacity="0.2"/>
  <circle cx="830" cy="40" r="1.5" fill="#1e3a5f" fill-opacity="0.25"/>

  <!-- Main title -->
  <text x="40" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="#1e3a5f" letter-spacing="0.5">
    AI from Demo to Production
  </text>

  <!-- Subtitle -->
  <text x="40" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#475569" letter-spacing="0.3">
    Jaden · Solutions Architect · 14 yrs · 8 Dev + 6 Presales
  </text>

  <!-- Tag -->
  <rect x="40" y="155" width="250" height="22" rx="4" fill="none" stroke="#1e3a5f" stroke-width="1" stroke-opacity="0.25"/>
  <text x="80" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#1e3a5f" fill-opacity="0.5" text-anchor="none">
    Enterprise AI · Agent Engineering
  </text>
</svg>
